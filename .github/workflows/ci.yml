name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  host-tests:
    name: Host tests (Unity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc cmake

      - name: Configure
        run: cmake -B build-tests -S tests -DCMAKE_C_COMPILER=gcc

      - name: Build
        run: cmake --build build-tests

      - name: Test
        working-directory: build-tests
        run: ctest --output-on-failure

  arm-f1:
    name: STM32F1 ${{ matrix.chip }} (${{ matrix.backend }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chip: [STM32F103xB, STM32F103xE, STM32F107xC]
        backend: [BLOG_BACKEND_UART_DMA, BLOG_BACKEND_SWO]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi cmake

      - name: Configure & Build
        run: >
          cmake -B build-arm --toolchain toolchain-arm.cmake
          -DSTM32F1_CHIP=${{ matrix.chip }}
          -DBLOG_BACKEND=${{ matrix.backend }} .
          && cmake --build build-arm

      - name: Report size
        run: |
          echo "## ${{ matrix.chip }} / ${{ matrix.backend }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          arm-none-eabi-size build-arm/BareLog.elf >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  arm-f4:
    name: STM32F4 ${{ matrix.chip }} (${{ matrix.backend }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chip: [STM32F407VG, STM32F429VI, STM32F446RE, STM32F401CE]
        backend: [BLOG_BACKEND_UART_DMA, BLOG_BACKEND_SWO]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi cmake

      - name: Configure & Build
        run: >
          cmake -B build-arm --toolchain toolchain-arm.cmake
          -DUHAL_TARGET=stm32f4
          -DSTM32F4_CHIP=${{ matrix.chip }}
          -DBLOG_BACKEND=${{ matrix.backend }} .
          && cmake --build build-arm

      - name: Report size
        run: |
          echo "## ${{ matrix.chip }} / ${{ matrix.backend }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          arm-none-eabi-size build-arm/BareLog.elf >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
